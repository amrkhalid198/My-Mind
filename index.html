<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- viewport-fit=cover: enables safe area insets for iPhone notch/Dynamic Island -->

    <meta name="theme-color" content="#0a0a09" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- black-translucent: status bar overlaps app, handled by pt-safe -->

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="My Brain" />

    <link rel="manifest" href="/manifest.json" />
    <title>My Brain</title>

    <style>
      /* Prevent flash of white before CSS loads */
      html, body { background-color: #0a0a09; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
